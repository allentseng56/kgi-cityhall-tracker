name: Daily BSR Fetch

# 台北 15:30 = UTC 07:30，週一至週五（涵蓋台股交易日）
on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 允許手動觸發（GitHub UI 上會有 Run workflow 按鈕）
    inputs:
      force:
        description: '強制抓取（即使該日已有資料），用於測試富邦雲端存取'
        type: boolean
        default: false

permissions:
  contents: write     # 需寫權限 commit SQLite + dashboard
  pages: write
  id-token: write

concurrency:
  group: daily-fetch
  cancel-in-progress: false  # 同時只跑一個，但若舊的還沒結束不強殺

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily fetch
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python backend/run_daily.py --no-browser ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}
        timeout-minutes: 25

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p docs
          cp output/dashboard.html docs/index.html
          # 加一個 .nojekyll 避免 GitHub Pages 把 _ 開頭的檔案濾掉
          touch docs/.nojekyll

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracker.sqlite docs/index.html output/dashboard.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            DATE=$(TZ='Asia/Taipei' date +%Y-%m-%d)
            git commit -m "auto: daily fetch ${DATE}"
            git push
          fi
